{% extends "base.html" %}

{% block body %}
<div class="app">
  <nav class="index">
    <div class="brand">
      <a data-target="{{ poems[0].slug if poems else '' }}" href="#{{ poems[0].slug if poems else '' }}"><b>Poemes in silico</b></a>
      <span class="author">Miquel Duran-Frigola</span>
    </div>
    <ol class="menu">
      {% for poem in poems %}
      <li><a data-target="{{ poem.slug }}" href="#{{ poem.slug }}">{{ poem.title }}</a></li>
      {% endfor %}
    </ol>
    <a class="ghlink" href="https://github.com/miquelduranfrigola/poemes-insilico" target="_blank" rel="noopener">GitHub ↗</a>
  </nav>

  <main class="stage">
    <iframe id="frame" title="poema"></iframe>
  </main>
</div>

<script>
  (function () {
    var menu = [].slice.call(document.querySelectorAll('.menu a[data-target]'));
    var links = [].slice.call(document.querySelectorAll('[data-target]'));
    var frame = document.getElementById('frame');
    var DEFAULT = {{ (poems[0].slug if poems else '') | tojson }};
    var current = DEFAULT;

    function show(id) {
      if (!id) id = DEFAULT;
      current = id;
      frame.src = id + '/index.html';
      links.forEach(function (a) { a.classList.toggle('on', a.dataset.target === id); });
      window.scrollTo(0, 0);
    }
    function go(id, focus) {
      history.replaceState(null, '', '#' + id);
      show(id);
      if (focus) {
        for (var i = 0; i < menu.length; i++) {
          if (menu[i].dataset.target === id) { menu[i].focus(); break; }
        }
      }
    }
    links.forEach(function (a) {
      a.addEventListener('click', function (e) { e.preventDefault(); go(a.dataset.target, false); });
    });

    function focusRail() {
      var on = menu[0];
      for (var i = 0; i < menu.length; i++) { if (menu[i].dataset.target === current) { on = menu[i]; break; } }
      if (on) on.focus();
    }
    function cycle(step) {
      var idx = 0;
      for (var i = 0; i < menu.length; i++) { if (menu[i].dataset.target === current) { idx = i; break; } }
      idx = (idx + step + menu.length) % menu.length;
      go(menu[idx].dataset.target, true);
    }
    // Keyboard: Up/Down (j/k) move within this menu; Right jumps to the poem's own
    // menu (inside the iframe); Left returns here.
    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); cycle(1); }
      else if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); cycle(-1); }
      else if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (frame.contentWindow) frame.contentWindow.postMessage({ pis: 'focusMenu' }, '*');
      } else if (e.key === 'ArrowLeft') { e.preventDefault(); focusRail(); }
    });
    // The iframe hands focus back to this rail with Left.
    window.addEventListener('message', function (e) {
      if (e.data && e.data.pis === 'toParent') focusRail();
    });

    show(location.hash.slice(1) || DEFAULT);
  })();
</script>
{% endblock %}
