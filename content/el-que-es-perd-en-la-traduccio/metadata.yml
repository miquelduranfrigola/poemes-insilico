# Multi-line description of the poem and the process behind it (Catalan).
description: |
  «Poetry is what gets lost in translation», deia Robert Frost. Aquest poema
  agafa els *Veinte poemas de amor y una canción desesperada* de Pablo Neruda i
  els fa travessar 104 traduccions automàtiques encadenades —del castellà a
  l'estonià, al basc, i així tota la volta de l'abecedari de llengües de Google
  fins a tornar al castellà. A cada salt el poema perd una mica més; el que en
  torna és el residu *despoetitzat*, un sediment de sentit alhora absurd i
  revelador. Es mostren els resultats de la tirada original de 2016, sense cap
  modificació més enllà de petites correccions gramaticals. Els poemes es llegeixen
  l'un rere l'altre, amb l'original de Neruda a un clic; una secció de metodologia
  anima el pas de les 104 llengües que els dissolen.
