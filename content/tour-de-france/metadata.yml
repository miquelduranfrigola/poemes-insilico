# Multi-line description of the poem and the process behind it (Catalan).
description: |
  Un mapa animat que recorre totes les edicions del Tour de França des del 1985
  —l'any que vaig néixer— fins al 2026. Cada dia de cada Tour es dibuixa com un arc
  entre la vila de sortida i la d'arribada, i els anys s'encavalquen fins a formar
  un embull de línies: la forma d'una vida mesurada en juliols. No són les
  carreteres reals —els traçats GPS només existeixen a partir del 2014—, sinó
  reconstruccions que uneixen d'on sortia cada etapa amb on arribava.
