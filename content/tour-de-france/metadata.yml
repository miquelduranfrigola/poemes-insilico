title: Tour de França
slug: tour-de-france
author: Miquel Duran-Frigola
date: 2026-07-13
order: 6
language: ca
# A self-contained animated map is served verbatim instead of poem.md.
page: index.html
# Computational tools used to assist this poem. Descriptions in Catalan.
tools:
  - name: Viquipèdia (etapes del Tour)
    description: >-
      Font de les etapes de cada edició (1985–2026): vila de sortida, vila
      d'arribada, distància i tipus, extretes de les taules de cada article.
  - name: OpenStreetMap · Nominatim
    description: >-
      Geocodificació de cada vila de sortida i d'arribada a coordenades, per
      poder situar les etapes sobre el mapa.
  - name: reconstrucció d'arcs (Bézier)
    description: >-
      Codi propi que dibuixa cada etapa com una corba entre la sortida i
      l'arribada; els traçats GPS reals no existeixen abans del 2014.
  - name: Natural Earth
    description: >-
      Contorn simplificat dels països d'Europa occidental que fa de mapa base,
      incrustat a la pàgina perquè funcioni sense connexió.
