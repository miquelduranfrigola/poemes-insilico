# Multi-line description of the poem and the process behind it (Catalan).
description: |
  L'avi deia que havia trobat un llangardaix fòssil a la vora de l'estany de
  Banyoles. No en queda cap resta ni ADN, però sí els seus parents vius. Aquest
  poema reconstrueix, amb bioinformàtica de veritat, el genoma mitocondrial de
  l'avantpassat comú de la humil sargantana de paret (*Podarcis muralis*) i el varà
  aquàtic (*Varanus salvator*): reconstrucció de seqüències ancestrals de tot el
  genoma mitocondrial —gens, ARN ribosòmics i ARN de transferència— a partir de sis
  espècies vives. El poema és el propi genoma inferit, escrit en majúscules allà on
  cent setanta milions d'anys l'han conservat intacte i en codis d'ambigüitat allà
  on el temps l'ha esborrat.
