# Multi-line description of the poem and the process behind it (Catalan).
description: |
  Un poema fet de noms de molècules: cada vers és el nom IUPAC en català d'una
  molècula real. Els noms són objectes trobats —el poeta no escriu les síl·labes,
  les aporta la química—, de manera que el treball és seleccionar noms que encaixin
  en un metre i agrupar-los en estrofes per família química, on la rima neix del
  sufix del grup funcional compartit. Els números i les lletres de la nomenclatura
  (2 → dos, N- → ena) es desconvolucionen a paraules abans de comptar.
